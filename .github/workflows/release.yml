name: Release

on:
  push:
    branches: [main]
    paths:
      - 'installer/output/*.exe'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from DaTT.iss
        id: version
        run: |
          VERSION=$(grep -oP '(?<=#define MyAppVersion ")[^"]+' installer/DaTT.iss)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=V$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Extract changelog notes for version
        id: changelog
        run: |
          python3 - <<'EOF'
          import re

          with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
              content = f.read()

          version = '${{ steps.version.outputs.version }}'
          pattern = rf'## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)'
          match = re.search(pattern, content, re.DOTALL)
          notes = match.group(1).strip() if match else f'Release {version}'

          with open('/tmp/release_notes.md', 'w', encoding='utf-8') as f:
              f.write(notes)

          print("Release notes:\n" + notes)
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: DaTT ${{ steps.version.outputs.version }}
          body_path: /tmp/release_notes.md
          files: installer/output/*.exe
          make_latest: true
